<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>villinale profile</title>

    <link rel="shortcut icon" href="icon/icon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://anijs.github.io/lib/anicollection/anicollection.css">
    <link rel="stylesheet" href="css/style_profile.css" type="text/css" />

    <script src="js/script.js"></script>
</head>

<body>
    <div id="top" class="top">
        <img class="top-img" src="img/bgimg.png" />
        <p class="top-p"> a photo in The Sims4</p>
    </div>

    <div id="main" class="main">
        <div class="leftbar">
            <div>
                <img class="leftbar-img" src="https://github.com/villinale.png?size=200" alt="img From GitHub" />
            </div>
            <div>
                <a class="leftbar-my-name">villinale</a>
                <div class="leftbar-my-data">
                    <i class="bi bi-geo-alt leftbar-icon"> 同济大学</i>
                    <i class="bi bi-github leftbar-icon">
                        <a class="leftbar-my-github-link" href="https://github.com/villinale">villinale</a>
                    </i>
                    <i class="bi bi-tencent-qq leftbar-icon"> 905466445</i>
                    <i class="bi bi-envelope leftbar-icon"> 905466445@qq.com</i>
                </div>
            </div>
        </div>
        <div class="rightbar">
        </div>
    </div>

    <div class="bottom">
        <p>@2023-2023 villinale<br>
            为啥叫这个名字我也忘记了</p>
    </div>


    <!-- AniJS core library -->
    <script src="https://anijs.github.io/lib/anijs/anijs-min.js"></script>
    <script src="https://anijs.github.io/lib/anijs/helpers/dom/anijs-helper-dom-min.js"></script>
    <!--simpleParallax Scripts-->
    <script src="https://cdn.jsdelivr.net/npm/simple-parallax-js@5.5.1/dist/simpleParallax.min.js"></script>
    <script>
        var image = document.getElementsByClassName('top-img');
        new simpleParallax(image, {
            orientation: 'left',
            delay: .6,
            transition: 'cubic-bezier(0,0,0,1)'
        });
    </script>
    <!-- barba.js Scripts -->
    <script src="https://unpkg.com/@barba/core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@barba/core"></script>
</body>

</html>
